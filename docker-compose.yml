services:
  photomem:
    build: .
    image: photomem:latest
    ports:
      - "8000:8000"
    volumes:
      # Required: mount your photo library (read-only)
      # Windows example: C:\Users\you\Pictures:/data/photos:ro
      # macOS/Linux example: /Users/you/Pictures:/data/photos:ro
      - ${PHOTOMEM_HOST_PHOTOS:-./photos}:/data/photos:ro
      # Persist DB, thumbnails, and ONNX models between restarts
      - photomem_cache:/app/cache
    environment:
      # Number of concurrent CLIP image encoders. Increase on machines with spare CPU.
      - PHOTOMEM_INDEX_WORKERS=4
      # Per-encoder PyTorch CPU threads. Total CPU use is roughly workers * threads.
      - PHOTOMEM_TORCH_THREADS=2
      # Poll the mounted photo folder every 5 minutes for new or changed files.
      - PHOTOMEM_SCAN_INTERVAL=300
      # Uncomment to expose on LAN (you are responsible for LAN security)
      # - PHOTOMEM_HOST=0.0.0.0
    restart: unless-stopped

volumes:
  photomem_cache:
