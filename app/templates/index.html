<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>photomem</title>
  <script src="/static/htmx.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f0f0f;
      color: #e8e8e8;
      min-height: 100vh;
    }

    header {
      padding: 1.5rem 2rem 1rem;
      border-bottom: 1px solid #1e1e1e;
    }

    header h1 {
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: 0;
      color: #fff;
      margin-bottom: 1rem;
    }

    .search-row {
      display: flex;
      gap: 0.5rem;
      align-items: center;
    }

    #search-input {
      flex: 1;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      color: #e8e8e8;
      font-size: 1rem;
      padding: 0.6rem 1rem;
      border-radius: 8px;
      outline: none;
      transition: border-color 0.15s;
    }
    #search-input:focus { border-color: #555; }
    #search-input::placeholder { color: #555; }

    .filters {
      display: flex;
      gap: 0.5rem;
      margin-top: 0.5rem;
      flex-wrap: wrap;
    }

    .filters input {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      color: #e8e8e8;
      font-size: 0.8rem;
      padding: 0.3rem 0.6rem;
      border-radius: 6px;
      outline: none;
    }
    .filters input::placeholder { color: #555; }

    #status-bar {
      padding: 0.4rem 2rem;
      background: #111;
      font-size: 0.75rem;
      color: #666;
      min-height: 1.8rem;
    }

    #results {
      padding: 1.5rem 2rem;
    }

    .htmx-indicator {
      display: none;
      color: #666;
      font-size: 0.85rem;
      padding: 1rem 0;
    }
    .htmx-request .htmx-indicator { display: block; }
  </style>
</head>
<body>
  <header>
    <h1>photomem</h1>
    <form
      hx-get="/search"
      hx-target="#results"
      hx-indicator="#search-indicator"
      hx-trigger="submit, keyup changed delay:400ms from:#search-input"
    >
      <div class="search-row">
        <input
          id="search-input"
          name="q"
          type="search"
          placeholder="사진 검색 - 예: 홍콩 여행, sunset beach, 가족 여행"
          autocomplete="off"
          autofocus
        >
      </div>
      <div class="filters">
        <input name="city" type="text" placeholder="도시 (city)" list="city-options" autocomplete="off">
        <datalist id="city-options"
          hx-get="/cities"
          hx-trigger="load"
          hx-swap="innerHTML"
        ></datalist>
        <input name="date_from" type="date" title="시작일">
        <input name="date_to" type="date" title="종료일">
      </div>
    </form>
  </header>

  <div
    id="status-bar"
    hx-get="/status"
    hx-trigger="load, every 5s"
    hx-swap="innerHTML"
  ></div>

  <div id="results" hx-get="/gallery" hx-trigger="load" hx-swap="innerHTML">
    <p class="htmx-indicator" id="search-indicator">검색 중...</p>
    <p style="color:#444; font-size:0.9rem;">사진을 불러오는 중...</p>
  </div>
</body>
</html>
