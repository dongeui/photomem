{% if error %}
  <p style="color:#e55; font-size:0.9rem;">오류: {{ error }}</p>

{% elif not results %}
  <p style="color:#555; font-size:0.9rem; padding-top:1rem;">
    {% if query %}
      "{{ query }}"에 해당하는 사진을 찾지 못했습니다.
    {% else %}
      검색어를 입력하세요.
    {% endif %}
  </p>

{% else %}
  <p style="color:#666; font-size:0.78rem; margin-bottom:0.75rem;">
    {{ results|length }}개 결과 - "{{ query }}"
  </p>
  {% set photos = results %}
  {% include "_photo_cards.html" %}
{% endif %}
